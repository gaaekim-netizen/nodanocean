<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오션중 노담해 포토부스</title>
    <style>
        body { margin: 0; background: #0f4c75; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; }
        #start-btn { padding: 20px 40px; font-size: 24px; font-weight: bold; background: #3282b8; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #countdown { display: none; font-size: 120px; font-weight: bold; position: absolute; z-index: 10; text-shadow: 3px 3px 10px rgba(0,0,0,0.5); }
        #camera-view { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top:0; left:0; z-index: 1; }
        #preview-container { display: none; position: relative; width: 400px; height: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #result-canvas { width: 100%; height: 100%; }
        #print-btn { display:none; margin-top: 20px; padding: 15px 30px; font-size: 20px; background: #e84545; color:white; border:none; border-radius:10px; cursor:pointer; z-index:10; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startPhotoBooth()">📸 촬영 시작하기</button>
    <div id="countdown"></div>
    <video id="camera-view" autoplay playsinline></video>
    
    <div id="preview-container">
        <canvas id="result-canvas" width="1200" height="1800"></canvas>
    </div>
    <button id="print-btn" onclick="window.print()">🖨️ 바로 인쇄하기</button>

    <script>
        const video = document.getElementById('camera-view');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('start-btn');
        const printBtn = document.getElementById('print-btn');
        const previewContainer = document.getElementById('preview-container');
        
        let shots = [];
        let shotCount = 0;
        const frameImg = new Image();
        frameImg.src = 'frame.png';

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 720 } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("카메라 권한을 허용해주세요."); });

        function startPhotoBooth() {
            startBtn.classList.add('hidden');
            shots = [];
            shotCount = 0;
            takeNextShot();
        }

        function takeNextShot() {
            if (shotCount < 4) {
                let count = 3;
                countdownEl.style.display = 'block';
                countdownEl.innerText = count;
                
                const timer = setInterval(() => {
                    count--;
                    if (count === 0) {
                        clearInterval(timer);
                        countdownEl.style.display = 'none';
                        capture();
                        shotCount++;
                        setTimeout(takeNextShot, 1000);
                    } else {
                        countdownEl.innerText = count;
                    }
                }, 1000);
            } else {
                drawPhotos();
            }
        }

        function capture() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;
            tempCanvas.height = 480;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.translate(640, 0);
            tempCtx.scale(-1, 1);
            tempCtx.drawImage(video, 0, 0, 640, 480);
            shots.push(tempCanvas);
        }

        function drawPhotos() {
            video.classList.add('hidden');
            previewContainer.style.display = 'block';
            printBtn.style.display = 'block';

            ctx.drawImage(frameImg, 0, 0, 1200, 1800);

            const positions = [
                {x: 80, y: 80},
                {x: 620, y: 80},
                {x: 80, y: 750},
                {x: 620, y: 750}
            ];

            shots.forEach((shot, index) => {
                if(positions[index]) {
                    ctx.drawImage(shot, 70, 0, 500, 480, positions[index].x, positions[index].y, 500, 620);
                }
            });
        }
    </script>
</body>
</html>
